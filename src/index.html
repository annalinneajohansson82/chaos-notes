<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ChaosNotes</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (function() {
      var stored = localStorage.getItem('chaos-notes-theme');
      var dark = stored !== null ? stored === 'true' : matchMedia('(prefers-color-scheme: dark)').matches;
      if (dark) document.documentElement.classList.add('wa-dark');
      var family = localStorage.getItem('chaos-notes-theme-family');
      if (family === 'dracula') document.documentElement.classList.add('theme-dracula');
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
